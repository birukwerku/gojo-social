<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ጎጆ</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Noto+Sans+Ethiopic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #20261F;
    --surface: #FAF8F3;
    --card: #FFFFFF;
    --border: #E4E0D6;
    --green: #3E6B4F;
    --greenDark: #25422F;
    --gold: #C98A3E;
    --coral: #C1543A;
    --muted: #7A7669;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans Ethiopic', -apple-system, sans-serif;
    background: var(--surface);
    color: var(--ink);
  }
  .hidden { display: none !important; }
  input, button, textarea { font-family: inherit; }
  input {
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    width: 100%;
  }
  button { cursor: pointer; border: none; border-radius: 10px; font-family: inherit; }

  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
  }
  .logo-mark {
    width: 64px; height: 64px; border-radius: 18px;
    background: var(--greenDark);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .logo-mark svg { width: 34px; height: 34px; }
  #auth-screen h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; margin: 0; }
  #auth-screen .tagline { color: var(--muted); font-size: 14px; margin: 4px 0 2rem; }
  .auth-card {
    background: var(--card); border: 0.5px solid var(--border); border-radius: 16px;
    padding: 1.5rem; width: 100%; max-width: 360px;
    box-shadow: 0 10px 30px rgba(37,66,47,0.08);
  }
  .auth-tabs { display: flex; border-radius: 10px; background: var(--surface); padding: 4px; margin-bottom: 1.25rem; }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 14px;
    background: transparent; color: var(--muted);
  }
  .auth-tab.active { background: var(--card); color: var(--ink); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .field { margin-bottom: 12px; }
  .field label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  .btn-primary { background: var(--green); color: #fff; padding: 11px; width: 100%; font-size: 14px; font-weight: 500; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); }
  .auth-error { color: var(--coral); font-size: 13px; margin: 8px 0 0; min-height: 16px; }
  .social-footer { margin-top: 2.5rem; display: flex; gap: 18px; }
  .social-footer a { color: var(--muted); text-decoration: none; display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border-radius: 50%; border: 0.5px solid var(--border); background: var(--card); }
  .social-footer svg { width: 18px; height: 18px; }

  #app-screen { min-height: 100vh; padding-bottom: 70px; }
  .topbar {
    position: sticky; top: 0; z-index: 5;
    background: var(--greenDark); color: #F5F2E9;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }
  .topbar .brand { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; }
  .topbar .brand svg { width: 24px; height: 24px; }
  .topbar button { background: transparent; color: #F5F2E9; font-size: 13px; padding: 6px 10px; border: 0.5px solid rgba(245,242,233,0.3); border-radius: 8px; }

  main.view { max-width: 560px; margin: 0 auto; padding: 1rem 1.1rem; }

  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 14px; box-shadow: 0 4px 14px rgba(37,66,47,0.05); }
  .avatar { border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
  .row { display: flex; gap: 10px; align-items: center; }
  .muted { color: var(--muted); font-size: 12px; }
  .actions { display: flex; gap: 18px; border-top: 0.5px solid var(--border); padding-top: 8px; margin-top: 8px; }
  .action-btn { display: flex; align-items: center; gap: 5px; background: transparent; color: var(--muted); font-size: 13px; padding: 0; }
  .comment-box { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .comment-line { display: flex; gap: 8px; margin-bottom: 8px; }
  .comment-bubble { font-size: 13px; background: var(--surface); border-radius: 10px; padding: 6px 10px; flex: 1; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 14px; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 6;
    background: var(--card); border-top: 0.5px solid var(--border);
    display: flex; justify-content: space-around; padding: 8px 0 10px;
  }
  .nav-btn { background: transparent; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); font-size: 10px; padding: 4px 8px; }
  .nav-btn.active { color: var(--green); font-weight: 500; }
  .nav-btn svg { width: 22px; height: 22px; }

  .profile-header { text-align: center; padding: 1rem 0 1.5rem; }
  .profile-header .avatar { width: 76px; height: 76px; font-size: 26px; margin: 0 auto 10px; }
  .profile-header h2 { margin: 0; font-size: 19px; font-weight: 500; }
  .profile-header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 11L12 4L21 11V20H14V14H10V20H3V11Z" stroke="#F5F2E9" stroke-width="1.6" stroke-linejoin="round"/></svg>
  </div>
  <h1>ጎጆ</h1>
  <p class="tagline">ማህበረሰብ የሚገናኝበት ትንሽ ጎጆ</p>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">ግባ</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">ተመዝገብ</button>
    </div>

    <div id="login-form">
      <div class="field"><label>ኢሜይል</label><input id="login-email" type="email" placeholder="name@example.com" /></div>
      <div class="field"><label>የይለፍ ቃል</label><input id="login-password" type="password" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doLogin()">ግባ</button>
    </div>

    <div id="register-form" class="hidden">
      <div class="field"><label>ሙሉ ስም</label><input id="reg-name" type="text" placeholder="ስምህ" /></div>
      <div class="field"><label>ኢሜይል</label><input id="reg-email" type="email" placeholder="name@example.com" /></div>
      <div class="field"><label>የይለፍ ቃል</label><input id="reg-password" type="password" placeholder="ቢያንስ 6 ፊደል" /></div>
      <button class="btn-primary" onclick="doRegister()">አካውንት ክፈት</button>
    </div>

    <p class="auth-error" id="auth-error"></p>
  </div>

  <div class="social-footer">
    <a href="#" title="Facebook"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 22v-8h3l1-4h-4V7c0-1 .3-2 2-2h2V1.1c-.4 0-1.6-.1-3-.1-3 0-5 1.8-5 5.1V10H5v4h4v8h4z"/></svg></a>
    <a href="#" title="Telegram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 4L2 11l6 2 2 6 3-4 5 4 3-15z"/></svg></a>
    <a href="#" title="Instagram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2.7 0 3 0 4.1.1 1.1 0 1.8.2 2.2.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.2.4.4 1.1.4 2.2.1 1.1.1 1.4.1 4.1s0 3-.1 4.1c0 1.1-.2 1.8-.4 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.2-1.1.4-2.2.4-1.1.1-1.4.1-4.1.1s-3 0-4.1-.1c-1.1 0-1.8-.2-2.2-.4-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.2-.4-.4-1.1-.4-2.2C2 15 2 14.7 2 12s0-3 .1-4.1c0-1.1.2-1.8.4-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.2 1.1-.4 2.2-.4C8 2 8.3 2 11 2h1zm0 3.6a6.4 6.4 0 100 12.8 6.4 6.4 0 000-12.8zm0 2a4.4 4.4 0 110 8.8 4.4 4.4 0 010-8.8zm6.7-2.2a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg></a>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 11L12 4L21 11V20H14V14H10V20H3V11Z" stroke="#F5F2E9" stroke-width="1.6" stroke-linejoin="round"/></svg>
      ጎጆ
    </div>
    <button onclick="doLogout()">ውጣ</button>
  </div>

  <main class="view" id="view-home">
    <div class="card">
      <div class="row" style="align-items:flex-start;">
        <div id="my-avatar" class="avatar" style="width:36px;height:36px;font-size:13px;"></div>
        <textarea id="draft" rows="2" placeholder="ምን እያሰብክ ነው?" style="flex:1;border:0.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:14px;resize:none;"></textarea>
      </div>
      <div style="display:flex; justify-content:flex-end; margin-top:10px;">
        <button id="post-btn" class="btn-primary" style="width:auto;padding:8px 16px;" onclick="handlePost()" disabled>ላክ</button>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span id="post-count" class="muted">እየጫነ ነው...</span>
    </div>

    <div id="feed"></div>
    <div id="empty" class="empty hidden">እስካሁን ምንም ልጥፍ የለም። የመጀመሪያውን ጻፍ!</div>
  </main>

  <main class="view hidden" id="view-profile">
    <div class="profile-header">
      <div id="profile-avatar" class="avatar"></div>
      <h2 id="profile-name-display"></h2>
      <p id="profile-email-display"></p>
    </div>
    <div class="card">
      <p class="muted" style="margin:0 0 6px;">የእኔ ልጥፎች</p>
    </div>
    <div id="my-posts"></div>
  </main>

  <main class="view hidden" id="view-soon">
    <div class="empty">ይህ ባህሪ በቅርቡ ይመጣል 🙂</div>
  </main>

  <div class="bottom-nav">
    <button class="nav-btn active" data-view="home" onclick="goTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 11L12 4L21 11V20H14V14H10V20H3V11Z"/></svg>
      መነሻ
    </button>
    <button class="nav-btn" data-view="soon" onclick="goTo('soon')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 20c0-3 2.5-5 6-5s6 2 6 5"/><path d="M14 15.5c3 0 5 1.7 5 4.5"/></svg>
      ጓደኞች
    </button>
    <button class="nav-btn" data-view="soon" onclick="goTo('soon')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3a6 6 0 00-6 6v4l-2 3h16l-2-3V9a6 6 0 00-6-6z"/><path d="M9.5 19a2.5 2.5 0 005 0"/></svg>
      ማሳወቂያ
    </button>
    <button class="nav-btn" data-view="profile" onclick="goTo('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.6 3-6 7-6s7 2.4 7 6"/></svg>
      ፕሮፋይል
    </button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBKJ9vAyoIt7YxM_2YQV0jpCdTfmcq3FC0",
    authDomain: "gojo-social.firebaseapp.com",
    databaseURL: "https://gojo-social-default-rtdb.firebaseio.com",
    projectId: "gojo-social",
    storageBucket: "gojo-social.firebasestorage.app",
    messagingSenderId: "705416128263",
    appId: "1:705416128263:web:b1c39b9572b3536af647a2"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const postsRef = db.collection("posts");
  const usersRef = db.collection("users");

  let currentUser = null;
  let unsubscribeFeed = null;

  const AVATAR_COLORS = ["#3E6B4F", "#C98A3E", "#C1543A", "#25422F"];
  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < (name || "").length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }
  function initials(name) {
    const parts = (name || "?").trim().split(" ").filter(Boolean);
    if (parts.length === 0) return "?";
    return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
  }
  function timeAgo(ts) {
    const diff = Math.max(0, Date.now() - ts);
    const min = Math.floor(diff / 60000);
    if (min < 1) return "አሁን";
    if (min < 60) return `${min} ደቂቃ በፊት`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr} ሰዓት በፊት`;
    return `${Math.floor(hr / 24)} ቀን በፊት`;
  }
  function escapeHtml(s) {
    const d = document.createElement("div");
    d.innerText = s;
    return d.innerHTML;
  }

  function switchTab(tab) {
    document.getElementById("tab-login").classList.toggle("active", tab === "login");
    document.getElementById("tab-register").classList.toggle("active", tab === "register");
    document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
    document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
    document.getElementById("auth-error").innerText = "";
  }

  function showAuthError(msg) {
    document.getElementById("auth-error").innerText = msg;
  }

  const ERROR_MESSAGES = {
    "auth/email-already-in-use": "ይህ ኢሜይል ቀድሞ ተመዝግቧል።",
    "auth/invalid-email": "ኢሜይሉ ትክክል አይደለም።",
    "auth/weak-password": "የይለፍ ቃሉ ቢያንስ 6 ፊደል መሆን አለበት።",
    "auth/user-not-found": "ተጠቃሚ አልተገኘም።",
    "auth/wrong-password": "የይለፍ ቃሉ ትክክል አይደለም።",
    "auth/invalid-credential": "ኢሜይል ወይም የይለፍ ቃል ትክክል አይደለም።",
  };

  function doRegister() {
    const name = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    if (!name || !email || !password) { showAuthError("እባክህ ሁሉንም መስኮች ሙላ።"); return; }
    showAuthError("");
    auth.createUserWithEmailAndPassword(email, password)
      .then((cred) => {
        return cred.user.updateProfile({ displayName: name }).then(() => {
          return usersRef.doc(cred.user.uid).set({ name, email, createdAt: Date.now() });
        });
      })
      .catch((err) => showAuthError(ERROR_MESSAGES[err.code] || err.message));
  }

  function doLogin() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    if (!email || !password) { showAuthError("እባክህ ኢሜይል እና የይለፍ ቃል አስገባ።"); return; }
    showAuthError("");
    auth.signInWithEmailAndPassword(email, password)
      .catch((err) => showAuthError(ERROR_MESSAGES[err.code] || err.message));
  }

  function doLogout() {
    auth.signOut();
  }

  function goTo(view) {
    document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
    document.getElementById(`view-${view}`).classList.remove("hidden");
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(`.nav-btn[data-view="${view}"]`)[0]?.classList.add("active");
    if (view === "profile") renderProfile();
  }

  document.getElementById("draft").addEventListener("input", (e) => {
    document.getElementById("post-btn").disabled = !e.target.value.trim();
  });

  function handlePost() {
    if (!currentUser) return;
    const draftEl = document.getElementById("draft");
    const text = draftEl.value.trim();
    if (!text) return;
    postsRef.add({
      uid: currentUser.uid,
      author: currentUser.displayName || "ስም አልባ",
      text: text,
      ts: Date.now(),
      likedBy: [],
      comments: []
    });
    draftEl.value = "";
    document.getElementById("post-btn").disabled = true;
  }

  function toggleLike(id, likedBy) {
    const me = currentUser.uid;
    const liked = likedBy.includes(me);
    const next = liked ? likedBy.filter(n => n !== me) : [...likedBy, me];
    postsRef.doc(id).update({ likedBy: next });
  }

  function addComment(id) {
    const input = document.getElementById(`comment-input-${id}`);
    const text = input.value.trim();
    if (!text) return;
    postsRef.doc(id).update({
      comments: firebase.firestore.FieldValue.arrayUnion({
        author: currentUser.displayName || "ስም አልባ",
        text: text,
        ts: Date.now()
      })
    });
    input.value = "";
  }

  function toggleComments(id) {
    const box = document.getElementById(`comments-${id}`);
    box.style.display = box.style.display === "none" ? "block" : "none";
  }

  function renderPost(doc) {
    const p = doc.data();
    const id = doc.id;
    const liked = currentUser && (p.likedBy || []).includes(currentUser.uid);
    const comments = p.comments || [];
    const commentsHtml = comments.map(c => `
      <div class="comment-line">
        <div class="avatar" style="width:24px;height:24px;font-size:10px;background:${avatarColor(c.author)};">${initials(c.author)}</div>
        <div class="comment-bubble"><b>${escapeHtml(c.author)}</b> ${escapeHtml(c.text)}</div>
      </div>
    `).join("");

    return `
      <div class="post card">
        <div class="row" style="margin-bottom:8px;">
          <div class="avatar" style="width:34px;height:34px;font-size:12px;background:${avatarColor(p.author)};">${initials(p.author)}</div>
          <div>
            <div style="font-size:14px;font-weight:500;">${escapeHtml(p.author)}</div>
            <div class="muted">${timeAgo(p.ts)}</div>
          </div>
        </div>
        <p style="font-size:15px;line-height:1.6;margin:0 0 10px;">${escapeHtml(p.text)}</p>
        <div class="actions">
          <button class="action-btn" style="color:${liked ? 'var(--coral)' : 'var(--muted)'};" onclick='toggleLike("${id}", ${JSON.stringify(p.likedBy || [])})'>
            ♥ ${(p.likedBy || []).length > 0 ? p.likedBy.length : "ውደድ"}
          </button>
          <button class="action-btn" onclick="toggleComments('${id}')">
            💬 ${comments.length > 0 ? comments.length : "አስተያየት"}
          </button>
        </div>
        <div id="comments-${id}" class="comment-box" style="display:none;">
          ${commentsHtml}
          <div class="row" style="margin-top:6px;">
            <input id="comment-input-${id}" placeholder="አስተያየት ጻፍ..." style="flex:1;" onkeydown="if(event.key==='Enter') addComment('${id}')" />
            <button style="background:var(--gold);color:#3A2A0F;padding:8px 12px;" onclick="addComment('${id}')">ላክ</button>
          </div>
        </div>
      </div>
    `;
  }

  function startFeedListener() {
    if (unsubscribeFeed) unsubscribeFeed();
    unsubscribeFeed = postsRef.orderBy("ts", "desc").onSnapshot((snapshot) => {
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty");
      const count = document.getElementById("post-count");
      if (snapshot.empty) {
        feed.innerHTML = "";
        empty.classList.remove("hidden");
        count.innerText = "0 ልጥፎች";
      } else {
        empty.classList.add("hidden");
        feed.innerHTML = snapshot.docs.map(renderPost).join("");
        count.innerText = `${snapshot.docs.length} ልጥፎች`;
      }
    }, (err) => {
      document.getElementById("post-count").innerText = "ስህተት ተፈጥሯል";
      console.error(err);
    });
  }

  function renderProfile() {
    if (!currentUser) return;
    const nameEl = document.getElementById("profile-name-display");
    const emailEl = document.getElementById("profile-email-display");
    const avatarEl = document.getElementById("profile-avatar");
    nameEl.innerText = currentUser.displayName || "ስም አልባ";
    emailEl.innerText = currentUser.email || "";
    avatarEl.style.background = avatarColor(currentUser.displayName || "?");
    avatarEl.innerText = initials(currentUser.displayName);

    postsRef.where("uid", "==", currentUser.uid).orderBy("ts", "desc").get().then((snap) => {
      const container = document.getElementById("my-posts");
      container.innerHTML = snap.empty
        ? '<div class="empty">ገና ምንም ልጥፍ የለህም።</div>'
        : snap.docs.map(renderPost).join("");
    });
  }

  function renderMyAvatar() {
    const el = document.getElementById("my-avatar");
    el.style.background = avatarColor(currentUser.displayName || "?");
    el.innerText = initials(currentUser.displayName);
  }

  auth.onAuthStateChanged((user) => {
    currentUser = user;
    if (user) {
      document.getElementById("auth-screen").classList.add("hidden");
      document.getElementById("app-screen").classList.remove("hidden");
      renderMyAvatar();
      startFeedListener();
      goTo("home");
    } else {
      document.getElementById("app-screen").classList.add("hidden");
      document.getElementById("auth-screen").classList.remove("hidden");
      if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
    }
  });
</script>
</body>
</html>
